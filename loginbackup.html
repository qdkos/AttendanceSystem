<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendease System</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-container">
        <form class="login-form" id="loginForm">
            <h2>Attendease System</h2>
            <p>Please enter your credentials to continue</p>

            <div class="input-group">
                <label for="role">Login As</label>
                <select id="role" name="role">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter Username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <button type="submit" class="login-btn" id="loginBtn">Login</button>

            <div class="footer-links">
                <a href="#" id="forgotPassword">Forgot Password?</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const role = document.getElementById('role').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');

            // Clear previous errors
            errorMessage.textContent = '';
            errorMessage.style.display = 'none';

            // Basic validation
            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                // Option 1: Send to backend API
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ role, username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store session/token
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userRole', role);
                    localStorage.setItem('username', username);

                    // Redirect based on role
                    redirectToDashboard(role);
                } else {
                    showError(data.message || 'Invalid credentials');
                }
            } catch (error) {
                // For demo/testing without backend, use mock authentication
                if (mockAuthenticate(role, username, password)) {
                    localStorage.setItem('userRole', role);
                    localStorage.setItem('username', username);
                    redirectToDashboard(role);
                } else {
                    showError('Invalid username or password');
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function redirectToDashboard(role) {
            const dashboards = {
                student: '/student/dashboard.html',
                teacher: '/teacher/dashboard.html',
                admin: '/admin/dashboard.html'
            };
            window.location.href = dashboards[role] || '/dashboard.html';
        }

        // Mock authentication for testing (remove in production)
        function mockAuthenticate(role, username, password) {
            const mockUsers = {
                student: { username: 'student', password: 'student123' },
                teacher: { username: 'teacher', password: 'teacher123' },
                admin: { username: 'admin', password: 'admin123' }
            };

            const user = mockUsers[role];
            return user && user.username === username && user.password === password;
        }

        // Forgot password handler
        document.getElementById('forgotPassword').addEventListener('click', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();

            if (username) {
                alert(`Password reset link will be sent for: ${username}`);
                // In production: send request to /api/forgot-password
            } else {
                alert('Please enter your username first');
                document.getElementById('username').focus();
            }
        });

        // Check if already logged in
        window.addEventListener('load', function () {
            const token = localStorage.getItem('authToken');
            const role = localStorage.getItem('userRole');

            if (token && role) {
                redirectToDashboard(role);
            }
        });
    </script>
</body>

</html>
